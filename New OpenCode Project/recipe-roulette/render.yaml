services:
  - type: web
    name: cookly
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cookly-db
          property: connectionString
      - key: AI_API_KEY
        value: your_openai_api_key_here
      - key: AI_API_URL
        value: https://api.openai.com/v1/chat/completions
      - key: AI_MODEL
        value: gpt-3.5-turbo

databases:
  - name: cookly-db
    databaseName: cookly
    plan: free
